  function showNotification(message, type = 'success') {

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // ======================== IMAGE COMPRESSION (No Firebase Storage!) ========================
  function compressImage(file) {
    return new Promise((resolve, reject) => {
      if (!file) {
        resolve("https://placehold.co/400x200/e2e8f0/475569?text=No+Image");
        return;
      }
      
      // Check if it's an image
      if (!file.type.startsWith('image/')) {
        resolve("https://placehold.co/400x200/e2e8f0/475569?text=Not+an+Image");
        return;
      }
      
      isCompressing = true;
      compressProgress = 0;
      render();
      
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = (e) => {
        const img = new Image();
        img.src = e.target.result;
        img.onload = () => {
          compressProgress = 30;
          render();
          
          // Calculate new dimensions
          let width = img.width;
          let height = img.height;
          
          if (width > MAX_IMAGE_DIMENSION || height > MAX_IMAGE_DIMENSION) {
            if (width > height) {
              height = (height * MAX_IMAGE_DIMENSION) / width;
              width = MAX_IMAGE_DIMENSION;
            } else {
              width = (width * MAX_IMAGE_DIMENSION) / height;
              height = MAX_IMAGE_DIMENSION;
            }
          }
          
          compressProgress = 60;
          render();
          
          // Create canvas and compress
          const canvas = document.createElement('canvas');
          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          let quality = 0.8;
          let result = canvas.toDataURL('image/jpeg', quality);
          
          // Reduce quality until size is under limit
          while (result.length > MAX_IMAGE_SIZE_KB * 1024 && quality > 0.1) {
            quality -= 0.1;
            result = canvas.toDataURL('image/jpeg', quality);
          }
          
          compressProgress = 100;
          render();
          
          setTimeout(() => {
            isCompressing = false;
            compressProgress = 0;
            resolve(result);
          }, 500);
        };
        img.onerror = () => {
          isCompressing = false;
          resolve("https://placehold.co/400x200/e2e8f0/475569?text=Invalid+Image");
        };
      };
      reader.onerror = () => {
        isCompressing = false;
        reject("Failed to read file");
      };
    });
  }

          updatedAt: data.updatedAt

  // ======================== STATISTICS ========================
  function getStats() {
    const totalOrders = orders.length;
    const pendingOrders = orders.filter(o => o.status === 'Pending').length;
    const preparingOrders = orders.filter(o => o.status === 'Preparing').length;
    const servedOrders = orders.filter(o => o.status === 'Served').length;
    const totalRevenue = orders.reduce((sum, o) => sum + (o.totalPrice || 0), 0);
    const availableItems = menuItems.filter(i => i.available).length;
    const unavailableItems = menuItems.filter(i => !i.available).length;
    
    return { totalOrders, pendingOrders, preparingOrders, servedOrders, totalRevenue, availableItems, unavailableItems };
  }
  
  function calculateTax(subtotal) {
    let cgst = (subtotal * TAX_CONFIG.cgst.rate) / 100;
    let sgst = (subtotal * TAX_CONFIG.sgst.rate) / 100;
    let serviceCharge = (subtotal * TAX_CONFIG.serviceCharge.rate) / 100;
    let totalTax = cgst + sgst + serviceCharge;
    let grandTotal = subtotal + totalTax;
    let roundOff = 0;
    
    if (TAX_CONFIG.roundOff) {
      const rounded = Math.round(grandTotal);
      roundOff = rounded - grandTotal;
      grandTotal = rounded;
    }
    
    return { subtotal, cgst, sgst, serviceCharge, totalTax, roundOff, grandTotal };
  }

            <h3 class="text-xl font-bold mb-2">📦 Order Tracking</h3>
            <p class="text-blue-100 text-sm mb-4">Track orders in real-time</p>
            <div class="inline-block bg-white text-blue-600 px-4 py-2 rounded-lg font-semibold"><i class="fas fa-truck-fast mr-2"></i> View Orders</div>
          </div>
        </div>
        
        <div class="bg-white rounded-xl shadow-sm p-6">
          <h2 class="font-bold mb-4">📋 Recent Orders</h2>
          ${recentOrders.length === 0 ? '<div class="text-center py-8"><i class="fas fa-shopping-bag text-5xl text-gray-300 mb-3"></i><p class="text-gray-500">No orders yet</p></div>' : `
            <div class="space-y-3 max-h-96 overflow-y-auto">
              ${recentOrders.map(order => `
                <div class="order-row border rounded-lg p-4 flex flex-wrap justify-between items-center gap-3">
                  <div><p class="font-semibold">#${order.id.slice(-8)}</p><p class="text-sm text-gray-500">Table ${order.tableNumber}</p></div>
                  <div><p>${order.items?.length || 0} items</p><p class="text-orange-600 font-bold">${formatCurrency(order.totalPrice)}</p></div>
                  <div><span class="px-3 py-1 rounded-full text-xs ${order.status === 'Pending' ? 'bg-yellow-100 text-yellow-700' : order.status === 'Preparing' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">${order.status}</span></div>
                  <div class="flex gap-2">
                    ${order.status === 'Pending' ? `<button class="acceptOrderBtn bg-green-500 text-white px-3 py-1 rounded text-xs" data-id="${order.id}">Accept</button>` : ''}
                    ${order.status === 'Preparing' ? `<button class="serveOrderBtn bg-purple-500 text-white px-3 py-1 rounded text-xs" data-id="${order.id}">Serve</button>` : ''}
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        </div>
      </div>
    `;
  }
  
  function renderMenuManagement() {
    if (isLoading) {
      return `<div class="min-h-screen flex items-center justify-center"><div class="text-center"><div class="loading-spinner mx-auto"></div><p class="mt-4">Loading menu from Firestore...</p></div></div>`;
    }
    
    const stats = getStats();
    
    return `
      <div class="p-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6 flex flex-wrap justify-between items-center gap-4">
          <div><button id="backToDashboard" class="text-gray-600 hover:text-orange-600 mr-4"><i class="fas fa-arrow-left"></i> Back</button><h1 class="text-2xl font-bold inline-block">Menu Management</h1><p class="text-gray-500 text-sm mt-1">${stats.availableItems} available • ${stats.unavailableItems} unavailable • Images in Firestore</p></div>
          <button id="addItemBtn" class="bg-orange-600 text-white px-5 py-2 rounded-lg font-semibold hover:bg-orange-700"><i class="fas fa-plus mr-2"></i> Add New Item</button>
        </div>
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
          ${menuItems.map(item => `
            <div class="bg-white rounded-xl shadow-sm overflow-hidden menu-card">
              <div class="relative h-48 bg-gray-100">
                <img src="${item.image}" class="menu-image" onerror="this.src='https://placehold.co/400x200/e2e8f0/475569?text=No+Image'">
                <div class="absolute top-2 right-2"><span class="px-2 py-1 rounded-full text-xs font-semibold ${item.available ? 'badge-available' : 'badge-unavailable'}">${item.available ? 'Available' : 'Unavailable'}</span></div>
              </div>
              <div class="p-4">
                <div class="flex justify-between items-start mb-2">
                  <div><h3 class="font-bold text-lg">${escapeHtml(item.name)}</h3><p class="text-xs text-gray-500">${item.category}</p></div>
                  <p class="text-orange-600 font-bold text-xl">${formatCurrency(item.price)}</p>
                </div>
                <p class="text-gray-500 text-sm mb-4">${escapeHtml(item.description || 'No description')}</p>
                <div class="flex gap-2">
                  <button class="editItemBtn flex-1 bg-gray-100 text-gray-700 px-3 py-2 rounded-lg text-sm hover:bg-gray-200" data-id="${item.id}"><i class="fas fa-edit mr-1"></i> Edit</button>
                  <button class="toggleAvailBtn flex-1 ${item.available ? 'bg-yellow-100 text-yellow-700' : 'bg-green-100 text-green-700'} px-3 py-2 rounded-lg text-sm" data-id="${item.id}" data-available="${item.available}"><i class="fas ${item.available ? 'fa-ban' : 'fa-check'} mr-1"></i> ${item.available ? 'Block' : 'Unblock'}</button>
                  <button class="deleteItemBtn bg-red-100 text-red-600 px-3 py-2 rounded-lg text-sm" data-id="${item.id}" data-name="${escapeHtml(item.name)}"><i class="fas fa-trash"></i></button>
                </div>
              </div>
            </div>
          `).join('')}
        </div>
        ${menuItems.length === 0 ? '<div class="text-center py-12 bg-white rounded-xl mt-5"><i class="fas fa-utensils text-5xl text-gray-300 mb-3"></i><p class="text-gray-500">No menu items. Click "Add New Item" to get started!</p></div>' : ''}
      </div>
    `;
  }
  
  function renderOrdersManagement() {
    const pending = orders.filter(o => o.status === 'Pending');
    const preparing = orders.filter(o => o.status === 'Preparing');
    const completed = orders.filter(o => o.status === 'Served');
    let ordersToShow = currentTab === 'pending' ? pending : currentTab === 'preparing' ? preparing : completed;
    
    return `
      <div class="p-6">
        <div class="bg-white rounded-2xl shadow-sm p-6 mb-6"><button id="backToDashboardOrders" class="text-gray-600 hover:text-orange-600 mr-4"><i class="fas fa-arrow-left"></i> Back</button><h1 class="text-2xl font-bold inline-block">Order Management</h1><p class="text-gray-500 text-sm mt-1">Real-time orders from Firestore</p></div>
        <div class="flex gap-2 mb-6 border-b">
          <button class="order-tab px-5 py-2 font-medium ${currentTab === 'pending' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-gray-500'}" data-tab="pending">Pending (${pending.length})</button>
          <button class="order-tab px-5 py-2 font-medium ${currentTab === 'preparing' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-gray-500'}" data-tab="preparing">Preparing (${preparing.length})</button>
          <button class="order-tab px-5 py-2 font-medium ${currentTab === 'completed' ? 'text-orange-600 border-b-2 border-orange-600' : 'text-gray-500'}" data-tab="completed">Completed (${completed.length})</button>
        </div>
        <div class="space-y-4">
          ${ordersToShow.length === 0 ? '<div class="bg-white rounded-xl p-12 text-center"><i class="fas fa-inbox text-5xl text-gray-300 mb-3"></i><p class="text-gray-500">No orders in this category</p></div>' : ordersToShow.map(order => `
            <div class="bg-white rounded-xl shadow-sm p-5 order-row">
              <div class="flex justify-between items-start mb-4">
                <div><h3 class="font-bold">Order #${order.id.slice(-8)}</h3><p class="text-sm text-gray-500">Table ${order.tableNumber} • ${new Date(order.timestamp).toLocaleString()}</p></div>
                <div class="text-right"><p class="text-2xl font-bold text-orange-600">${formatCurrency(order.totalPrice)}</p><span class="px-3 py-1 rounded-full text-xs ${order.status === 'Pending' ? 'bg-yellow-100 text-yellow-700' : order.status === 'Preparing' ? 'bg-blue-100 text-blue-700' : 'bg-green-100 text-green-700'}">${order.status}</span></div>
              </div>
              <div class="border-t pt-3 mb-3"><p class="font-medium mb-2">Items:</p>${order.items.map(item => `<div class="flex justify-between text-sm"><span>${escapeHtml(item.name)} x${item.quantity}</span><span>${formatCurrency(item.price * item.quantity)}</span></div>`).join('')}</div>
              <div class="flex gap-2">
                ${order.status === 'Pending' ? `<button class="acceptOrderBtn bg-green-500 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}"><i class="fas fa-check mr-1"></i> Accept & Prepare</button>` : ''}
                ${order.status === 'Preparing' ? `<button class="serveOrderBtn bg-purple-500 text-white px-4 py-2 rounded-lg text-sm" data-id="${order.id}"><i class="fas fa-check-double mr-1"></i> Mark as Served</button>` : ''}
              </div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }
  
  function renderTaxModal() {
    if (!showTaxModal) return '';
    return `
      <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" id="taxModalOverlay">
        <div class="bg-white rounded-2xl max-w-md w-full p-6">
          <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold"><i class="fas fa-percent text-orange-600 mr-2"></i> Tax Settings</h2><button id="closeTaxModal" class="text-gray-400 text-2xl">&times;</button></div>
          <div class="space-y-4">
            <div class="border-b pb-3"><h3 class="font-semibold mb-2">GST Settings</h3>
              <label class="flex justify-between py-2"><span>CGST (2.5%)</span><input type="checkbox" id="cgstEnabled" ${TAX_CONFIG.cgst.enabled ? 'checked' : ''}></label>
              <label class="flex justify-between py-2"><span>SGST (2.5%)</span><input type="checkbox" id="sgstEnabled" ${TAX_CONFIG.sgst.enabled ? 'checked' : ''}></label>
            </div>
            <div class="border-b pb-3"><h3 class="font-semibold mb-2">Additional Charges</h3>
              <label class="flex justify-between py-2"><span>Service Charge (5%)</span><input type="checkbox" id="serviceChargeEnabled" ${TAX_CONFIG.serviceCharge.enabled ? 'checked' : ''}></label>
            </div>
            <div><label class="flex justify-between py-2"><span>Round Off to Nearest Rupee</span><input type="checkbox" id="roundOffEnabled" ${TAX_CONFIG.roundOff ? 'checked' : ''}></label></div>
          </div>
          <div class="flex gap-3 mt-6"><button id="saveTaxBtn" class="flex-1 bg-orange-600 text-white py-2 rounded-lg font-semibold">Save Settings</button><button id="cancelTaxBtn" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button></div>
        </div>
      </div>
    `;
  }
  
  function renderAddEditModal() {
    if (!showModal) return '';
    const isEditing = editingItem !== null;
    const item = editingItem || {};
    
    return `
      <div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4" id="modalOverlay">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 max-h-[90vh] overflow-y-auto">
          <div class="flex justify-between items-center mb-4"><h2 class="text-xl font-bold">${isEditing ? '✏️ Edit Item' : '➕ Add New Item'}</h2><button id="closeModalBtn" class="text-gray-400 text-2xl">&times;</button></div>
          <div class="space-y-4">
            <div><label class="block text-sm font-medium mb-1">Item Name *</label><input type="text" id="itemName" class="w-full border rounded-lg px-3 py-2" placeholder="Butter Chicken" value="${escapeHtml(item.name || '')}"></div>
            <div><label class="block text-sm font-medium mb-1">Price (₹) *</label><input type="number" id="itemPrice" class="w-full border rounded-lg px-3 py-2" placeholder="299" value="${item.price || ''}"></div>
            <div><label class="block text-sm font-medium mb-1">Category</label><select id="itemCategory" class="w-full border rounded-lg px-3 py-2">${categories.map(c => `<option value="${c}" ${item.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
            <div><label class="block text-sm font-medium mb-1">Description</label><textarea id="itemDescription" rows="3" class="w-full border rounded-lg px-3 py-2" placeholder="Brief description">${escapeHtml(item.description || '')}</textarea></div>
            <div><label class="block text-sm font-medium mb-1">Upload Image (JPG, PNG, GIF)</label><input type="file" id="itemFile" accept="image/*" class="w-full border rounded-lg px-3 py-2"><div class="mt-2"><img id="filePreview" src="${item.image || ''}" class="image-preview ${item.image ? '' : 'hidden'}" onerror="this.src='https://placehold.co/120x120/e2e8f0/475569?text=No+Image'"><div id="fileInfo" class="text-xs text-gray-500 mt-1 ${!item.image ? 'hidden' : ''}"></div></div>${isCompressing ? `<div class="mt-2"><div class="bg-gray-200 rounded-full h-2"><div class="bg-orange-600 h-2 rounded-full compress-progress" style="width: ${compressProgress}%"></div></div><p class="text-xs text-gray-500 mt-1">Compressing image: ${compressProgress}%</p></div>` : ''}<p class="text-xs text-gray-400 mt-2"><i class="fas fa-info-circle"></i> Images are compressed to under 400KB and stored directly in Firestore (No external storage needed!)</p></div>
          </div>
          <div class="flex gap-3 mt-6"><button id="saveItemBtn" class="flex-1 bg-orange-600 text-white py-2 rounded-lg font-semibold" ${isCompressing ? 'disabled' : ''}><i class="fas fa-save mr-2"></i> ${isEditing ? 'Update Item' : 'Add Item'}</button><button id="cancelModalBtn" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button></div>
        </div>
      </div>
    `;
  }
  
  function render() {
    const root = document.getElementById('admin-root');
    if (!root) return;
    
    if (!isLoggedIn) {
      root.innerHTML = renderLogin();
      attachLoginEvents();
      return;
    }
    
    let main = currentView === 'dashboard' ? renderDashboard() : currentView === 'menu' ? renderMenuManagement() : renderOrdersManagement();
    root.innerHTML = main + renderAddEditModal() + renderTaxModal();
    attachEvents();
  }
  
  // ======================== EVENT HANDLERS ========================
  function attachLoginEvents() {
    document.getElementById('loginBtn')?.addEventListener('click', () => {
      const email = document.getElementById('email')?.value;
      const pwd = document.getElementById('password')?.value;
      if (email === ADMIN_EMAIL && pwd === ADMIN_PASSWORD) {
        isLoggedIn = true;
        localStorage.setItem('admin_logged', 'true');
        listenToMenu();
        listenToOrders();
        initializeDefaultMenu();
        currentView = 'dashboard';
        render();
      } else {
        showNotification('Invalid credentials!', 'error');
      }
    });
  }
  
  function attachEvents() {
    document.getElementById('logoutBtn')?.addEventListener('click', () => { isLoggedIn = false; localStorage.removeItem('admin_logged'); render(); });
    document.getElementById('goToMenuBtn')?.addEventListener('click', () => { currentView = 'menu'; render(); });
    document.getElementById('goToOrdersBtn')?.addEventListener('click', () => { currentView = 'orders'; currentTab = 'pending'; render(); });
    document.getElementById('viewAllOrdersBtn')?.addEventListener('click', () => { currentView = 'orders'; currentTab = 'pending'; render(); });
    document.getElementById('backToDashboard')?.addEventListener('click', () => { currentView = 'dashboard'; render(); });
    document.getElementById('backToDashboardOrders')?.addEventListener('click', () => { currentView = 'dashboard'; render(); });
    document.getElementById('addItemBtn')?.addEventListener('click', () => { editingItem = null; selectedFile = null; imagePreviewUrl = null; showModal = true; render(); });
    document.getElementById('taxSettingsBtn')?.addEventListener('click', () => { showTaxModal = true; render(); });
    
    document.getElementById('itemFile')?.addEventListener('change', handleFileSelect);
    
    document.querySelectorAll('.editItemBtn').forEach(btn => {
      btn.addEventListener('click', () => { editingItem = menuItems.find(i => i.id === btn.dataset.id); selectedFile = null; imagePreviewUrl = editingItem?.image || null; showModal = true; render(); });
    });
    
    document.querySelectorAll('.toggleAvailBtn').forEach(btn => {
      btn.addEventListener('click', () => { toggleAvailability(btn.dataset.id, btn.dataset.available === 'true'); });
    });
    
    document.querySelectorAll('.deleteItemBtn').forEach(btn => {
      btn.addEventListener('click', () => { deleteMenuItem(btn.dataset.id, btn.dataset.name); });
    });
    
    document.querySelectorAll('.acceptOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Preparing'); });
    });
    
    document.querySelectorAll('.serveOrderBtn').forEach(btn => {
      btn.addEventListener('click', () => { updateOrderStatus(btn.dataset.id, 'Served'); });
    });
    
    document.querySelectorAll('.order-tab').forEach(tab => {
      tab.addEventListener('click', () => { currentTab = tab.dataset.tab; render(); });
    });
    
    const closeModal = () => { showModal = false; editingItem = null; selectedFile = null; imagePreviewUrl = null; isCompressing = false; compressProgress = 0; render(); };
    const closeTaxModal = () => { showTaxModal = false; render(); };
    
    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('cancelModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('modalOverlay')?.addEventListener('click', (e) => { if (e.target.id === 'modalOverlay') closeModal(); });
    document.getElementById('closeTaxModal')?.addEventListener('click', closeTaxModal);
    document.getElementById('cancelTaxBtn')?.addEventListener('click', closeTaxModal);
    document.getElementById('taxModalOverlay')?.addEventListener('click', (e) => { if (e.target.id === 'taxModalOverlay') closeTaxModal(); });
    
    document.getElementById('saveTaxBtn')?.addEventListener('click', () => {
      TAX_CONFIG.cgst.enabled = document.getElementById('cgstEnabled')?.checked || false;
      TAX_CONFIG.sgst.enabled = document.getElementById('sgstEnabled')?.checked || false;
      TAX_CONFIG.serviceCharge.enabled = document.getElementById('serviceChargeEnabled')?.checked || false;
      TAX_CONFIG.roundOff = document.getElementById('roundOffEnabled')?.checked || false;
      showNotification('Tax settings saved!', 'success');
      showTaxModal = false;
      render();
    });
    
    document.getElementById('saveItemBtn')?.addEventListener('click', async () => {
      const name = document.getElementById('itemName')?.value.trim();
      const price = parseFloat(document.getElementById('itemPrice')?.value);
      const category = document.getElementById('itemCategory')?.value;
      const description = document.getElementById('itemDescription')?.value;
      const file = document.getElementById('itemFile')?.files[0];
      
      if (!name || !price || isNaN(price) || price <= 0) {
        showNotification('Please enter valid name and price', 'error');
        return;
      }
      
      if (editingItem) {
        await updateMenuItem(editingItem.id, { name, price, category, description }, file);
      } else {
        await addMenuItem({ name, price, category, description }, file);
      }
      closeModal();
    });
  }
  
  // ======================== INITIALIZATION ========================
  function init() {
    render();
  }
  
  init();
</script>
</body>
</html>
