<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>RestoPOS | Professional Restaurant Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .sidebar-item { transition: all 0.2s ease; cursor: pointer; }
    .sidebar-item:hover { background: #fef3c7; color: #f97316; }
    .sidebar-item.active { background: linear-gradient(135deg, #f97316, #ea580c); color: white; box-shadow: 0 4px 12px rgba(249,115,22,0.3); }
    .menu-item-card { transition: all 0.2s ease; cursor: pointer; }
    .menu-item-card:hover { transform: translateY(-2px); box-shadow: 0 8px 20px -6px rgba(0,0,0,0.1); }
    .pos-item { transition: all 0.1s ease; cursor: pointer; }
    .pos-item:active { transform: scale(0.98); }
    .veg-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .veg-dot.green { background: #22c55e; }
    .veg-dot.red { background: #ef4444; }
    .toast { animation: slideIn 0.3s ease-out; position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
    @media print { body * { visibility: hidden; } .receipt-print, .receipt-print * { visibility: visible; } .receipt-print { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; background: white; z-index: 9999; } }
    .receipt { font-family: monospace; max-width: 350px; margin: 0 auto; }
    .image-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; border: 2px solid #f97316; margin-top: 10px; }
    .upload-area { border: 2px dashed #cbd5e1; border-radius: 12px; transition: all 0.2s; cursor: pointer; }
    .upload-area:hover { border-color: #f97316; background: #fef3c7; }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
  // ======================== FIREBASE CONFIGURATION ========================
  const firebaseConfig = {
    apiKey: "AIzaSyDnTl39uYi-NHhBEMeObezN2Uyqkk8sk6Q",
    authDomain: "qrdines-829b7.firebaseapp.com",
    projectId: "qrdines-829b7",
    storageBucket: "qrdines-829b7.firebasestorage.app",
    messagingSenderId: "1025530812948",
    appId: "1:1025530812948:web:66f8e69e0d5af83461e501",
    measurementId: "G-8Y4DWD208G"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    addDoc, 
    updateDoc, 
    deleteDoc, 
    doc, 
    onSnapshot, 
    query, 
    where, 
    serverTimestamp,
    getDocs,
    orderBy
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  import {
    getAuth,
    signInWithEmailAndPassword,
    signOut,
    onAuthStateChanged,
    createUserWithEmailAndPassword,
    updateProfile
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  // ======================== RESTAURANT SETTINGS ========================
  let restaurantSettings = {
    name: 'Spice Garden',
    address: '123 Food Street, MG Road, Bangalore - 560001',
    phone: '+91 98765 43210',
    gstin: '32ABCDE1234F1Z5',
    cgstRate: 2.5,
    sgstRate: 2.5,
    roundOff: true
  };

  // ======================== STATE ========================
  let menuItems = [];
  let orders = [];
  let currentUser = null;
  let userRestaurantData = null;
  let isLoggedIn = false;
  let currentSection = 'pos';
  let currentOrder = [];
  let orderCounter = 1;
  let toast = null;
  let showAddItemModal = false;
  let editingItem = null;
  let selectedImageFile = null;
  let imagePreviewUrl = null;
  let logs = [];
  let salesData = [];
  let isLoading = true;
  let unsubscribeMenu = null;
  let unsubscribeOrders = null;

  // Load order counter from localStorage
  function loadOrderCounter() { const saved = localStorage.getItem('resto_order_counter'); if (saved) orderCounter = parseInt(saved); else orderCounter = 1; }
  function saveOrderCounter() { localStorage.setItem('resto_order_counter', orderCounter); }

  function formatCurrency(amount) { return '₹' + amount.toFixed(0); }
  
  function showToast(message, type = 'success') {
    toast = { message, type };
    render();
    setTimeout(() => { toast = null; render(); }, 3000);
  }

  // Image upload handler
  function handleImageUpload(file) {
    return new Promise((resolve) => {
      if (!file) { resolve(null); return; }
      const reader = new FileReader();
      reader.onload = (e) => { resolve(e.target.result); };
      reader.readAsDataURL(file);
    });
  }

  // GST Calculation with CGST, SGST, and Round Off
  function calculateGST(subtotal) {
    let cgst = (subtotal * restaurantSettings.cgstRate) / 100;
    let sgst = (subtotal * restaurantSettings.sgstRate) / 100;
    let totalTax = cgst + sgst;
    let grandTotal = subtotal + totalTax;
    let roundOff = 0;
    if (restaurantSettings.roundOff) {
      let rounded = Math.round(grandTotal);
      roundOff = rounded - grandTotal;
      grandTotal = rounded;
    }
    return { subtotal, cgst, sgst, totalTax, roundOff, grandTotal };
  }

  // ======================== FIREBASE DATA FUNCTIONS ========================
  async function createRestaurantProfile(userId, name, address, phone) {
    try {
      const docRef = await addDoc(collection(db, "restaurants"), {
        userId: userId,
        name: name,
        address: address,
        phone: phone,
        cgstRate: 2.5,
        sgstRate: 2.5,
        roundOff: true,
        createdAt: serverTimestamp()
      });
      return { id: docRef.id };
    } catch (error) { console.error(error); throw error; }
  }

  async function getRestaurantProfile(userId) {
    try {
      const q = query(collection(db, "restaurants"), where("userId", "==", userId));
      const snapshot = await getDocs(q);
      if (!snapshot.empty) {
        const data = snapshot.docs[0].data();
        return { id: snapshot.docs[0].id, ...data };
      }
      return null;
    } catch (error) { return null; }
  }

  function listenToMenu() {
    if (!isLoggedIn || !currentUser) return;
    isLoading = true;
    const menuQuery = query(collection(db, "menu"), where("restaurantId", "==", currentUser.uid));
    if (unsubscribeMenu) unsubscribeMenu();
    unsubscribeMenu = onSnapshot(menuQuery, (snapshot) => {
      menuItems = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        menuItems.push({ id: doc.id, name: data.name || '', price: data.price || 0, category: data.category || '', description: data.description || '', image: data.image || "https://placehold.co/80x80/F97316/white?text=Food", veg: data.veg !== undefined ? data.veg : true, available: data.available !== false, prepTime: data.prepTime || 15, popular: data.popular || false });
      });
      isLoading = false;
      render();
    }, (error) => { isLoading = false; showToast("Error loading menu: " + error.message, "error"); });
  }

  function listenToOrders() {
    if (!isLoggedIn || !currentUser) return;
    const ordersQuery = query(collection(db, "orders"), where("restaurantId", "==", currentUser.uid), orderBy("timestamp", "desc"));
    if (unsubscribeOrders) unsubscribeOrders();
    unsubscribeOrders = onSnapshot(ordersQuery, (snapshot) => {
      orders = [];
      salesData = [];
      snapshot.forEach((doc) => {
        const data = doc.data();
        orders.push({ id: doc.id, ...data });
        if (data.status !== 'Declined') {
          salesData.push({ id: doc.id, amount: data.totalPrice, time: data.timestamp?.toDate?.() || new Date(), items: data.items?.length || 0 });
        }
      });
      render();
    });
  }

  async function addMenuItemToFirebase(itemData, file) {
    try {
      let imageData = "https://placehold.co/80x80/F97316/white?text=Food";
      if (file) {
        const reader = new FileReader();
        imageData = await new Promise((resolve) => {
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(file);
        });
      }
      await addDoc(collection(db, "menu"), {
        restaurantId: currentUser.uid,
        name: itemData.name,
        price: parseFloat(itemData.price),
        category: itemData.category,
        description: itemData.description || '',
        image: imageData,
        veg: itemData.veg,
        available: true,
        prepTime: itemData.prepTime || 15,
        popular: false,
        createdAt: serverTimestamp()
      });
      showToast(`✅ "${itemData.name}" added!`, 'success');
      return true;
    } catch (error) { showToast("Error: " + error.message, 'error'); return false; }
  }

  async function updateMenuItemInFirebase(id, updates, file) {
    try {
      let updateData = { name: updates.name, price: parseFloat(updates.price), category: updates.category, description: updates.description || '', veg: updates.veg, updatedAt: serverTimestamp() };
      if (file) {
        const reader = new FileReader();
        updateData.image = await new Promise((resolve) => {
          reader.onload = (e) => resolve(e.target.result);
          reader.readAsDataURL(file);
        });
      }
      await updateDoc(doc(db, "menu", id), updateData);
      showToast(`✅ "${updates.name}" updated!`, 'success');
      return true;
    } catch (error) { showToast("Error: " + error.message, 'error'); return false; }
  }

  async function deleteMenuItemFromFirebase(id, name) {
    if (!confirm(`⚠️ Delete "${name}" permanently?`)) return;
    try { await deleteDoc(doc(db, "menu", id)); showToast(`✅ "${name}" deleted!`, 'success'); } 
    catch (error) { showToast("Error deleting", 'error'); }
  }

  async function toggleAvailabilityInFirebase(id, currentStatus) {
    try { await updateDoc(doc(db, "menu", id), { available: !currentStatus }); showToast(`Item ${!currentStatus ? 'available' : 'unavailable'}`, 'info'); } 
    catch (error) { showToast("Error updating status", 'error'); }
  }

  async function saveOrderToFirebase(orderData) {
    try {
      await addDoc(collection(db, "orders"), {
        ...orderData,
        restaurantId: currentUser.uid,
        createdAt: serverTimestamp()
      });
    } catch (error) { console.error("Error saving order:", error); }
  }

  async function logActivity(event, details) {
    try {
      await addDoc(collection(db, "logs"), {
        restaurantId: currentUser.uid,
        event: event,
        details: details,
        time: new Date().toLocaleString(),
        timestamp: serverTimestamp()
      });
    } catch (error) { console.error("Error logging:", error); }
  }

  // ======================== BUSINESS LOGIC ========================
  function addToOrder(item) {
    const existing = currentOrder.find(i => i.id === item.id);
    if (existing) existing.quantity++;
    else currentOrder.push({ ...item, quantity: 1 });
    showToast(`${item.name} added to order`, 'success');
    render();
  }

  function updateOrderQuantity(itemId, change) {
    const item = currentOrder.find(i => i.id === itemId);
    if (item) {
      item.quantity += change;
      if (item.quantity <= 0) currentOrder = currentOrder.filter(i => i.id !== itemId);
      render();
    }
  }

  function removeFromOrder(itemId) {
    currentOrder = currentOrder.filter(i => i.id !== itemId);
    render();
  }

  function getSubtotal() { return currentOrder.reduce((sum, i) => sum + (i.price * i.quantity), 0); }
  function getTaxDetails() { return calculateGST(getSubtotal()); }

  function generateBillNumber() {
    const billNum = String(orderCounter).padStart(4, '0');
    orderCounter++;
    saveOrderCounter();
    return billNum;
  }

  async function generateReceipt() {
    if (currentOrder.length === 0) { showToast('No items in order', 'error'); return; }
    const billNumber = generateBillNumber();
    const date = new Date().toLocaleString();
    const subtotal = getSubtotal();
    const taxDetails = calculateGST(subtotal);
    
    const orderData = {
      billNumber: billNumber,
      items: currentOrder.map(i => ({ name: i.name, quantity: i.quantity, price: i.price, veg: i.veg })),
      subtotal: subtotal,
      cgst: taxDetails.cgst,
      sgst: taxDetails.sgst,
      totalPrice: taxDetails.grandTotal,
      status: 'Completed',
      timestamp: new Date().toISOString()
    };
    
    await saveOrderToFirebase(orderData);
    await logActivity(`BILL_GENERATED - ${billNumber}`, `${currentOrder.length} items, Total: ${formatCurrency(taxDetails.grandTotal)}`);
    
    const receiptHTML = `
      <div class="receipt" style="font-family: monospace; max-width: 350px; margin: 0 auto; padding: 20px;">
        <div style="text-align: center; border-bottom: 1px dashed #ccc; padding-bottom: 10px; margin-bottom: 10px;">
          <h2 style="margin: 0; font-size: 18px;">${restaurantSettings.name}</h2>
          <p style="margin: 5px 0; font-size: 11px;">${restaurantSettings.address}</p>
          <p style="margin: 2px 0; font-size: 11px;">GST: ${restaurantSettings.gstin}</p>
          <p style="margin: 2px 0; font-size: 11px;">Tel: ${restaurantSettings.phone}</p>
        </div>
        <div style="margin-bottom: 10px;"><p><strong>Bill No:</strong> ${billNumber}</p><p><strong>Date:</strong> ${date}</p></div>
        <table style="width: 100%; border-collapse: collapse; margin-bottom: 10px;">
          <thead><tr style="border-bottom: 1px solid #ccc;"><th>Item</th><th>Qty</th><th class="text-right">Price</th><th class="text-right">Total</th></tr></thead>
          <tbody>${currentOrder.map(item => `<tr><td>${item.name} <span class="veg-dot ${item.veg ? 'green' : 'red'}" style="display: inline-block;"></span></td><td style="text-align: center;">${item.quantity}</td><td class="text-right">${formatCurrency(item.price)}</td><td class="text-right">${formatCurrency(item.price * item.quantity)}</td></tr>`).join('')}</tbody>
        </table>
        <div style="border-top: 1px solid #ccc; padding-top: 10px;">
          <div style="display: flex; justify-content: space-between;"><span>Subtotal:</span><span>${formatCurrency(taxDetails.subtotal)}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>CGST (${restaurantSettings.cgstRate}%):</span><span>${formatCurrency(taxDetails.cgst)}</span></div>
          <div style="display: flex; justify-content: space-between;"><span>SGST (${restaurantSettings.sgstRate}%):</span><span>${formatCurrency(taxDetails.sgst)}</span></div>
          ${taxDetails.roundOff !== 0 ? `<div style="display: flex; justify-content: space-between;"><span>Round Off:</span><span>${taxDetails.roundOff > 0 ? '+' : ''}${formatCurrency(taxDetails.roundOff)}</span></div>` : ''}
          <div style="display: flex; justify-content: space-between; font-weight: bold; margin-top: 10px; font-size: 16px; border-top: 1px solid #ccc; padding-top: 10px;"><span>TOTAL:</span><span>${formatCurrency(taxDetails.grandTotal)}</span></div>
        </div>
        <div style="text-align: center; margin-top: 20px; border-top: 1px dashed #ccc; padding-top: 10px;">
          <p>Thank you! Visit Again</p>
          <p style="font-size: 10px;">** Digital Invoice **</p>
        </div>
      </div>
    `;
    
    const printWindow = window.open('', '_blank');
    printWindow.document.write(`
      <html><head><title>Receipt - ${billNumber}</title><style>body { font-family: monospace; }</style></head>
      <body>${receiptHTML}<script>window.onload = function() { window.print(); setTimeout(function() { window.close(); }, 1000); };<\/script></body>
      </html>
    `);
    printWindow.document.close();
    
    currentOrder = [];
    showToast(`Bill ${billNumber} generated!`, 'success');
    render();
  }

  // ======================== AUTHENTICATION ========================
  async function loginUser(email, password) {
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      isLoggedIn = true;
      userRestaurantData = await getRestaurantProfile(currentUser.uid);
      if (userRestaurantData) {
        restaurantSettings.name = userRestaurantData.name || restaurantSettings.name;
        restaurantSettings.address = userRestaurantData.address || restaurantSettings.address;
        restaurantSettings.phone = userRestaurantData.phone || restaurantSettings.phone;
        restaurantSettings.cgstRate = userRestaurantData.cgstRate || 2.5;
        restaurantSettings.sgstRate = userRestaurantData.sgstRate || 2.5;
        restaurantSettings.roundOff = userRestaurantData.roundOff !== false;
      }
      showToast(`Welcome back, ${restaurantSettings.name}!`, 'success');
      listenToMenu();
      listenToOrders();
      render();
      return true;
    } catch (error) { showToast(error.message, 'error'); return false; }
  }

  async function registerUser(email, password, name, restaurantName, address, phone) {
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      currentUser = userCredential.user;
      await updateProfile(currentUser, { displayName: name });
      await createRestaurantProfile(currentUser.uid, restaurantName, address, phone);
      isLoggedIn = true;
      restaurantSettings.name = restaurantName;
      restaurantSettings.address = address;
      restaurantSettings.phone = phone;
      showToast(`Welcome ${name}! Your restaurant is ready.`, 'success');
      listenToMenu();
      listenToOrders();
      render();
      return true;
    } catch (error) { showToast(error.message, 'error'); return false; }
  }

  async function logoutUser() {
    try { await signOut(auth); currentUser = null; isLoggedIn = false; menuItems = []; orders = []; currentOrder = []; showToast('Logged out', 'info'); render(); } 
    catch (error) { showToast("Error logging out", 'error'); }
  }

  function checkAuthState() {
    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        isLoggedIn = true;
        userRestaurantData = await getRestaurantProfile(currentUser.uid);
        if (userRestaurantData) {
          restaurantSettings.name = userRestaurantData.name || restaurantSettings.name;
          restaurantSettings.address = userRestaurantData.address || restaurantSettings.address;
          restaurantSettings.phone = userRestaurantData.phone || restaurantSettings.phone;
        }
        listenToMenu();
        listenToOrders();
        render();
      } else { isLoggedIn = false; render(); }
    });
  }

  async function saveSettings() {
    if (userRestaurantData?.id) {
      try {
        await updateDoc(doc(db, "restaurants", userRestaurantData.id), {
          name: restaurantSettings.name,
          address: restaurantSettings.address,
          phone: restaurantSettings.phone,
          gstin: restaurantSettings.gstin,
          cgstRate: restaurantSettings.cgstRate,
          sgstRate: restaurantSettings.sgstRate,
          roundOff: restaurantSettings.roundOff,
          updatedAt: serverTimestamp()
        });
        showToast('Settings saved to database!', 'success');
      } catch (error) { showToast('Error saving settings', 'error'); }
    }
    render();
  }

  // ======================== RENDER FUNCTIONS ========================
  function renderLogin() {
    return `
      <div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-orange-50 to-amber-100 p-4">
        <div class="bg-white rounded-2xl p-8 max-w-md w-full shadow-2xl">
          <div class="text-center mb-6">
            <div class="inline-block bg-orange-100 rounded-full p-4 mb-4"><i class="fas fa-utensils text-5xl text-orange-600"></i></div>
            <h2 class="text-2xl font-bold">RestoPOS</h2>
            <p class="text-gray-500 text-sm">Professional Restaurant Management</p>
          </div>
          <div id="loginForm"><div class="space-y-4"><input type="email" id="loginEmail" placeholder="Email" class="w-full border rounded-lg px-4 py-3"><input type="password" id="loginPassword" placeholder="Password" class="w-full border rounded-lg px-4 py-3"><button id="loginBtn" class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold">Login</button><p class="text-center text-sm">New restaurant? <button id="showRegisterBtn" class="text-orange-600">Register</button></p></div></div>
          <div id="registerForm" class="hidden"><div class="space-y-4"><input type="text" id="regRestaurantName" placeholder="Restaurant Name" class="w-full border rounded-lg px-4 py-3"><input type="text" id="regOwnerName" placeholder="Owner Name" class="w-full border rounded-lg px-4 py-3"><input type="email" id="regEmail" placeholder="Email" class="w-full border rounded-lg px-4 py-3"><input type="password" id="regPassword" placeholder="Password" class="w-full border rounded-lg px-4 py-3"><textarea id="regAddress" rows="2" placeholder="Address" class="w-full border rounded-lg px-4 py-3"></textarea><input type="tel" id="regPhone" placeholder="Phone" class="w-full border rounded-lg px-4 py-3"><button id="registerBtn" class="w-full bg-orange-600 text-white py-3 rounded-lg font-semibold">Register</button><p class="text-center text-sm">Already registered? <button id="showLoginBtn" class="text-orange-600">Login</button></p></div></div>
        </div>
      </div>
    `;
  }

  function renderSidebar() {
    const items = [
      { id: 'pos', icon: 'fa-cash-register', label: 'POS / Billing' },
      { id: 'dashboard', icon: 'fa-chart-line', label: 'Dashboard' },
      { id: 'menu', icon: 'fa-utensils', label: 'Menu Management' },
      { id: 'analytics', icon: 'fa-chart-bar', label: 'Analytics' },
      { id: 'settings', icon: 'fa-cog', label: 'Settings' }
    ];
    return `<div class="fixed left-0 top-0 h-full w-64 bg-white shadow-xl z-20"><div class="p-6 border-b"><h1 class="font-bold text-2xl">Resto<span class="text-orange-500">POS</span></h1><p class="text-xs text-gray-500">Premium Dashboard</p></div><nav class="p-4 space-y-1">${items.map(item => `<div onclick="window.setSection('${item.id}')" class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-xl font-medium ${currentSection === item.id ? 'active' : ''}"><i class="fas ${item.icon} w-5"></i><span>${item.label}</span></div>`).join('')}</nav><div class="absolute bottom-6 left-0 right-0 px-4"><div class="bg-gray-50 rounded-xl p-3 text-center"><i class="fas fa-user-circle text-orange-500 text-2xl mb-1"></i><p class="text-xs font-medium">${currentUser?.displayName || 'Staff'}</p><p class="text-xs text-gray-400">Restaurant Admin</p></div></div></div>`;
  }

  function renderTopBar() {
    const currentTime = new Date().toLocaleString('en-US', { hour: '2-digit', minute: '2-digit', day: 'numeric', month: 'short' });
    return `<div class="flex justify-between items-center px-8 py-4 bg-white shadow-sm sticky top-0 z-10"><div><h2 class="text-xl font-bold capitalize">${currentSection === 'pos' ? 'POS / Billing' : currentSection}</h2></div><div class="flex items-center gap-6"><div class="text-right"><p class="text-sm font-medium">${restaurantSettings.name}</p><p class="text-xs text-gray-500">${currentTime}</p></div><button onclick="window.logout()" class="text-red-500 hover:text-red-600"><i class="fas fa-sign-out-alt"></i></button></div></div>`;
  }

  function renderPOS() {
    const taxDetails = calculateGST(getSubtotal());
    return `<div class="flex flex-col lg:flex-row h-full"><div class="flex-1 p-6"><div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">${menuItems.filter(i => i.available).map(item => `<div onclick="window.addToOrder(${JSON.stringify(item).replace(/"/g, '&quot;')})" class="pos-item bg-white rounded-xl p-4 text-center shadow-sm hover:shadow-md transition"><img src="${item.image}" class="w-16 h-16 mx-auto rounded-lg object-cover mb-2"><div class="flex items-center justify-center gap-1"><span class="veg-dot ${item.veg ? 'green' : 'red'}"></span><span class="font-semibold text-sm">${item.name}</span></div><p class="text-orange-600 font-bold mt-1">${formatCurrency(item.price)}</p></div>`).join('')}</div></div><div class="w-full lg:w-96 bg-white border-l border-gray-200 p-6"><div class="flex justify-between items-center mb-4"><h3 class="font-bold text-lg">Current Order</h3><span class="text-xs text-gray-500">${currentOrder.length} items</span></div><div class="space-y-3 max-h-96 overflow-y-auto mb-4">${currentOrder.length === 0 ? '<div class="text-center py-8 text-gray-400"><i class="fas fa-shopping-cart text-4xl mb-2"></i><p>No items added</p></div>' : currentOrder.map(item => `<div class="flex justify-between items-center p-3 bg-gray-50 rounded-lg"><div class="flex-1"><p class="font-medium">${item.name}</p><p class="text-sm text-gray-500">${formatCurrency(item.price)}</p></div><div class="flex items-center gap-2"><button onclick="window.updateOrderQty(${item.id}, -1)" class="w-8 h-8 rounded-full bg-gray-200 hover:bg-gray-300">-</button><span class="w-8 text-center font-semibold">${item.quantity}</span><button onclick="window.updateOrderQty(${item.id}, 1)" class="w-8 h-8 rounded-full bg-orange-100 hover:bg-orange-200">+</button><button onclick="window.removeFromOrder(${item.id})" class="ml-2 text-red-500 hover:text-red-700"><i class="fas fa-trash"></i></button></div></div>`).join('')}</div><div class="border-t pt-4 space-y-2"><div class="flex justify-between"><span>Subtotal</span><span>${formatCurrency(taxDetails.subtotal)}</span></div><div class="flex justify-between"><span>CGST (${restaurantSettings.cgstRate}%)</span><span>${formatCurrency(taxDetails.cgst)}</span></div><div class="flex justify-between"><span>SGST (${restaurantSettings.sgstRate}%)</span><span>${formatCurrency(taxDetails.sgst)}</span></div>${taxDetails.roundOff !== 0 ? `<div class="flex justify-between"><span>Round Off</span><span>${taxDetails.roundOff > 0 ? '+' : ''}${formatCurrency(taxDetails.roundOff)}</span></div>` : ''}<div class="flex justify-between font-bold text-lg pt-2 border-t"><span>Total</span><span class="text-orange-600">${formatCurrency(taxDetails.grandTotal)}</span></div><button onclick="window.generateReceipt()" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold mt-4 hover:bg-orange-700 transition" ${currentOrder.length === 0 ? 'disabled' : ''}>Generate Bill & Print</button></div></div></div>`;
  }

  function renderDashboard() {
    const totalRevenue = salesData.reduce((sum, s) => sum + s.amount, 0);
    const totalOrders = salesData.length;
    return `<div class="p-8"><div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-8"><div class="bg-white rounded-xl p-5"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center"><i class="fas fa-rupee-sign text-green-600 text-xl"></i></div><div><p class="text-gray-500">Total Revenue</p><p class="text-2xl font-bold">${formatCurrency(totalRevenue)}</p></div></div></div><div class="bg-white rounded-xl p-5"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center"><i class="fas fa-receipt text-blue-600 text-xl"></i></div><div><p class="text-gray-500">Total Orders</p><p class="text-2xl font-bold">${totalOrders}</p></div></div></div><div class="bg-white rounded-xl p-5"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-orange-100 rounded-xl flex items-center justify-center"><i class="fas fa-utensils text-orange-600 text-xl"></i></div><div><p class="text-gray-500">Menu Items</p><p class="text-2xl font-bold">${menuItems.length}</p></div></div></div><div class="bg-white rounded-xl p-5"><div class="flex items-center gap-4"><div class="w-12 h-12 bg-purple-100 rounded-xl flex items-center justify-center"><i class="fas fa-clock text-purple-600 text-xl"></i></div><div><p class="text-gray-500">Active Items</p><p class="text-2xl font-bold">${menuItems.filter(i => i.available).length}</p></div></div></div></div><div class="bg-white rounded-xl p-6"><h3 class="font-bold mb-4">Recent Orders</h3>${orders.slice(0,5).map(o => `<div class="flex justify-between items-center py-2 border-b"><div>Bill #${o.billNumber}</div><div>${formatCurrency(o.totalPrice)}</div><span class="text-xs text-gray-500">${new Date(o.timestamp).toLocaleDateString()}</span></div>`).join('')}</div></div>`;
  }

  function renderMenuManagement() {
    if (isLoading) return `<div class="flex items-center justify-center h-64"><div class="loading-spinner mx-auto"></div></div>`;
    return `<div class="p-8"><div class="flex justify-between items-center mb-6"><h3 class="text-xl font-bold">Menu Management</h3><button onclick="window.openAddItemModal()" class="bg-orange-600 text-white px-4 py-2 rounded-lg"><i class="fas fa-plus"></i> Add Item</button></div><div class="bg-white rounded-xl overflow-x-auto"><table class="w-full"><thead class="bg-gray-50"><tr><th class="p-3">Image</th><th class="p-3">Name</th><th class="p-3">Category</th><th class="p-3">Price</th><th class="p-3">Type</th><th class="p-3">Status</th><th class="p-3">Actions</th></tr></thead><tbody>${menuItems.map(item => `<tr class="border-b"><td class="p-3"><img src="${item.image}" class="w-12 h-12 rounded-lg object-cover"></td><td class="p-3 font-medium">${item.name}${item.popular ? ' 🔥' : ''}</td><td class="p-3">${item.category}</td><td class="p-3 font-bold text-orange-600">${formatCurrency(item.price)}</td><td class="p-3"><span class="veg-dot ${item.veg ? 'green' : 'red'}"></span>${item.veg ? 'Veg' : 'Non-Veg'}</td><td class="p-3"><button onclick="window.toggleAvail('${item.id}', ${item.available})" class="px-3 py-1 rounded-full text-xs ${item.available ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${item.available ? 'Available' : 'Out of Stock'}</button></td><td class="p-3"><button onclick="window.editItem('${item.id}')" class="text-blue-500 mr-2"><i class="fas fa-edit"></i></button><button onclick="window.deleteItem('${item.id}', '${item.name}')" class="text-red-500"><i class="fas fa-trash"></i></button></td></tr>`).join('')}</tbody>}</table></div></div>`;
  }

  function renderAnalytics() {
    const totalRevenue = salesData.reduce((sum, s) => sum + s.amount, 0);
    const avgOrder = salesData.length ? totalRevenue / salesData.length : 0;
    setTimeout(() => {
      const revCtx = document.getElementById('revenueChart')?.getContext('2d');
      if (revCtx) new Chart(revCtx, { type: 'bar', data: { labels: salesData.slice(-7).map((_,i) => `Day ${i+1}`), datasets: [{ label: 'Revenue', data: salesData.slice(-7).map(s => s.amount), backgroundColor: '#f97316' }] }, options: { responsive: true } });
    }, 100);
    return `<div class="p-8"><div class="grid grid-cols-1 lg:grid-cols-2 gap-6"><div class="bg-white rounded-xl p-6"><h3 class="font-bold mb-4">Revenue Chart</h3><canvas id="revenueChart" height="200"></canvas></div><div class="bg-white rounded-xl p-6"><h3 class="font-bold mb-4">Key Metrics</h3><div class="space-y-4"><div><p class="text-gray-500">Total Revenue</p><p class="text-2xl font-bold text-green-600">${formatCurrency(totalRevenue)}</p></div><div><p class="text-gray-500">Average Order Value</p><p class="text-2xl font-bold text-orange-600">${formatCurrency(avgOrder)}</p></div><div><p class="text-gray-500">Tax Configuration</p><div class="mt-2 text-sm"><p>CGST: ${restaurantSettings.cgstRate}% | SGST: ${restaurantSettings.sgstRate}%</p><p>Round Off: ${restaurantSettings.roundOff ? 'Enabled' : 'Disabled'}</p></div></div></div></div></div></div>`;
  }

  function renderSettings() {
    return `<div class="p-8"><div class="bg-white rounded-xl shadow-sm p-6 max-w-2xl"><h3 class="font-bold text-xl mb-6">Restaurant Settings</h3><div class="space-y-4"><div><label class="block text-sm font-medium mb-1">Restaurant Name</label><input type="text" id="restoName" value="${restaurantSettings.name}" class="w-full border rounded-lg px-3 py-2"></div><div><label class="block text-sm font-medium mb-1">Address</label><textarea id="restoAddress" rows="2" class="w-full border rounded-lg px-3 py-2">${restaurantSettings.address}</textarea></div><div><label class="block text-sm font-medium mb-1">Phone</label><input type="text" id="restoPhone" value="${restaurantSettings.phone}" class="w-full border rounded-lg px-3 py-2"></div><div><label class="block text-sm font-medium mb-1">GST Number</label><input type="text" id="restoGST" value="${restaurantSettings.gstin}" class="w-full border rounded-lg px-3 py-2"></div><div class="grid grid-cols-2 gap-3"><div><label class="block text-sm font-medium mb-1">CGST Rate (%)</label><input type="number" id="cgstRate" value="${restaurantSettings.cgstRate}" step="0.1" class="w-full border rounded-lg px-3 py-2"></div><div><label class="block text-sm font-medium mb-1">SGST Rate (%)</label><input type="number" id="sgstRate" value="${restaurantSettings.sgstRate}" step="0.1" class="w-full border rounded-lg px-3 py-2"></div></div><label class="flex items-center justify-between py-2"><span class="text-sm font-medium">Round Off to Nearest Rupee</span><input type="checkbox" id="roundOff" ${restaurantSettings.roundOff ? 'checked' : ''}></label><button onclick="window.saveSettings()" class="bg-orange-600 text-white px-6 py-2 rounded-lg font-medium">Save Changes</button></div></div></div>`;
  }

  function renderAddItemModal() {
    if (!showAddItemModal) return '';
    return `<div class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4"><div class="bg-white rounded-2xl max-w-md w-full p-6"><h2 class="text-xl font-bold mb-4">${editingItem ? '✏️ Edit Item' : '➕ Add New Item'}</h2><div class="space-y-3"><input type="text" id="itemName" placeholder="Item Name" class="w-full border rounded-lg px-3 py-2" value="${editingItem?.name || ''}"><input type="number" id="itemPrice" placeholder="Price" class="w-full border rounded-lg px-3 py-2" value="${editingItem?.price || ''}"><select id="itemCategory" class="w-full border rounded-lg px-3 py-2"><option>Starters</option><option>Main Course</option><option>Breads</option><option>Beverages</option><option>Desserts</option></select><textarea id="itemDescription" rows="2" placeholder="Description" class="w-full border rounded-lg px-3 py-2">${editingItem?.description || ''}</textarea><div class="flex gap-4"><label><input type="radio" name="vegType" value="veg" ${editingItem?.veg !== false ? 'checked' : ''}> Veg</label><label><input type="radio" name="vegType" value="nonveg" ${editingItem?.veg === false ? 'checked' : ''}> Non-Veg</label></div><div class="upload-area p-4 text-center cursor-pointer" onclick="document.getElementById('imageUpload').click()"><i class="fas fa-cloud-upload-alt text-3xl text-gray-400 mb-2"></i><p class="text-sm text-gray-500">Click to upload image</p><input type="file" id="imageUpload" accept="image/*" class="hidden" onchange="window.handleImageSelect(event)"></div><div id="imagePreviewContainer" class="text-center ${!imagePreviewUrl && !editingItem?.image ? 'hidden' : ''}"><img id="imagePreview" src="${imagePreviewUrl || editingItem?.image || ''}" class="image-preview mx-auto"><button type="button" onclick="window.clearImage()" class="text-red-500 text-xs mt-1">Remove</button></div></div><div class="flex gap-3 mt-6"><button onclick="window.saveMenuItem()" class="flex-1 bg-orange-600 text-white py-2 rounded-lg">${editingItem ? 'Update' : 'Add'}</button><button onclick="window.closeModal()" class="flex-1 bg-gray-100 py-2 rounded-lg">Cancel</button></div></div></div>`;
  }

  function render() {
    const root = document.getElementById('root');
    if (!root) return;
    if (!isLoggedIn) { root.innerHTML = renderLogin(); attachLoginEvents(); return; }
    let main = '';
    if (currentSection === 'pos') main = renderPOS();
    else if (currentSection === 'dashboard') main = renderDashboard();
    else if (currentSection === 'menu') main = renderMenuManagement();
    else if (currentSection === 'analytics') main = renderAnalytics();
    else main = renderSettings();
    root.innerHTML = `<div class="min-h-screen bg-gray-50"><div class="ml-64">${renderTopBar()}${main}</div>${renderSidebar()}${renderAddItemModal()}</div>${toast ? `<div class="toast ${toast.type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white px-4 py-2 rounded-lg shadow-lg">${toast.message}</div>` : ''}`;
    attachEvents();
  }

  function attachLoginEvents() {
    document.getElementById('loginBtn')?.addEventListener('click', () => { const email = document.getElementById('loginEmail')?.value; const pass = document.getElementById('loginPassword')?.value; if(email && pass) loginUser(email, pass); });
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => { document.getElementById('loginForm').classList.add('hidden'); document.getElementById('registerForm').classList.remove('hidden'); });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => { document.getElementById('registerForm').classList.add('hidden'); document.getElementById('loginForm').classList.remove('hidden'); });
    document.getElementById('registerBtn')?.addEventListener('click', () => { const name = document.getElementById('regRestaurantName')?.value; const owner = document.getElementById('regOwnerName')?.value; const email = document.getElementById('regEmail')?.value; const pass = document.getElementById('regPassword')?.value; const addr = document.getElementById('regAddress')?.value; const phone = document.getElementById('regPhone')?.value; if(name && owner && email && pass) registerUser(email, pass, owner, name, addr, phone); });
  }

  function attachEvents() {
    document.getElementById('restoName')?.addEventListener('change', (e) => { restaurantSettings.name = e.target.value; });
    document.getElementById('restoAddress')?.addEventListener('change', (e) => { restaurantSettings.address = e.target.value; });
    document.getElementById('restoPhone')?.addEventListener('change', (e) => { restaurantSettings.phone = e.target.value; });
    document.getElementById('restoGST')?.addEventListener('change', (e) => { restaurantSettings.gstin = e.target.value; });
    document.getElementById('cgstRate')?.addEventListener('change', (e) => { restaurantSettings.cgstRate = parseFloat(e.target.value) || 2.5; });
    document.getElementById('sgstRate')?.addEventListener('change', (e) => { restaurantSettings.sgstRate = parseFloat(e.target.value) || 2.5; });
    document.getElementById('roundOff')?.addEventListener('change', (e) => { restaurantSettings.roundOff = e.target.checked; });
  }

  window.setSection = (s) => { currentSection = s; render(); };
  window.logout = logoutUser;
  window.addToOrder = addToOrder;
  window.updateOrderQty = updateOrderQuantity;
  window.removeFromOrder = removeFromOrder;
  window.generateReceipt = generateReceipt;
  window.toggleAvail = (id, status) => toggleAvailabilityInFirebase(id, status);
  window.deleteItem = (id, name) => deleteMenuItemFromFirebase(id, name);
  window.editItem = (id) => { editingItem = menuItems.find(i => i.id === id); selectedImageFile = null; imagePreviewUrl = editingItem?.image || null; showAddItemModal = true; render(); };
  window.openAddItemModal = () => { editingItem = null; selectedImageFile = null; imagePreviewUrl = null; showAddItemModal = true; render(); };
  window.closeModal = () => { showAddItemModal = false; editingItem = null; selectedImageFile = null; imagePreviewUrl = null; render(); };
  window.handleImageSelect = (event) => {
    const file = event.target.files[0];
    if (file) { selectedImageFile = file; const reader = new FileReader(); reader.onload = (e) => { imagePreviewUrl = e.target.result; document.getElementById('imagePreview').src = imagePreviewUrl; document.getElementById('imagePreviewContainer')?.classList.remove('hidden'); }; reader.readAsDataURL(file); }
  };
  window.clearImage = () => { selectedImageFile = null; imagePreviewUrl = null; document.getElementById('imagePreviewContainer')?.classList.add('hidden'); document.getElementById('imageUpload').value = ''; };
  window.saveMenuItem = async () => {
    const name = document.getElementById('itemName')?.value;
    const price = parseFloat(document.getElementById('itemPrice')?.value);
    const category = document.getElementById('itemCategory')?.value;
    const description = document.getElementById('itemDescription')?.value;
    const veg = document.querySelector('input[name="vegType"]:checked')?.value === 'veg';
    if (!name || !price) { alert('Please fill name and price'); return; }
    if (editingItem) await updateMenuItemInFirebase(editingItem.id, { name, price, category, description, veg }, selectedImageFile);
    else await addMenuItemToFirebase({ name, price, category, description, veg }, selectedImageFile);
    showAddItemModal = false; editingItem = null; selectedImageFile = null; imagePreviewUrl = null; render();
  };
  window.saveSettings = async () => {
    await saveSettings();
    render();
  };

  loadOrderCounter();
  checkAuthState();
</script>
</body>
</html>
