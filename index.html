<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>QR Dine | Digital Menu & Ordering with GST</title>
  <!-- Tailwind CSS + Font Awesome -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    body { background: #f8fafc; }
    .menu-item { transition: all 0.2s ease; cursor: pointer; }
    .menu-item:active { transform: scale(0.98); }
    .food-image { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; background: #f1f5f9; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .animate-slide-up { animation: slideUp 0.3s ease-out; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #e2e8f0; }
    ::-webkit-scrollbar-thumb { background: #f97316; border-radius: 10px; }
    .status-tracker-line { position: absolute; top: 24px; left: 0; right: 0; height: 3px; background: #e2e8f0; z-index: 0; }
    .status-dot-active { background: #f97316; box-shadow: 0 0 0 4px rgba(249,115,22,0.2); }
    .loading-spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #f97316;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
  </style>
</head>
<body>

  // ======================== TAX CONFIGURATION (Restaurant Standard) ========================

    cgst: { rate: 2.5, name: "CGST", description: "Central GST" },
    sgst: { rate: 2.5, name: "SGST", description: "State GST" },
    totalGst: 5, // Total GST = CGST + SGST
    
    // Additional Charges
    serviceCharge: { rate: 5, name: "Service Charge", enabled: true },
    packingCharge: { amount: 10, name: "Packing Charges", enabled: false },
    platformFee: { amount: 5, name: "Platform Fee", enabled: false },
    
    // Rounding
    roundOff: true
  };

   const firebaseConfig = {

    projectId: "qrdines-829b7",

    appId: "1:1025530812948:web:66f8e69e0d5af83461e501",

  // ======================== GLOBAL STATE ========================
  let menuItems = [];

  let tableNumber = new URLSearchParams(window.location.search).get('table') || '1';
  let currentStep = 1;
  let currentOrderId = null;
  let currentOrderStatus = null;
  let selectedCategory = 'All';
  let isLoading = true;
  let useFirebase = false; // Set to true only if Firebase is properly configured
  let ordersList = [];
  
  const categories = ['All', 'Starters', 'Main Course', 'Breads', 'Beverages', 'Desserts'];
  
  // ======================== DEFAULT MENU DATA ========================
  const DEFAULT_MENU = [
    { id: 1, name: "🧀 Paneer Tikka", price: 220, image: "https://images.pexels.com/photos/1279330/pexels-photo-1279330.jpeg?w=150&h=150&fit=crop", category: "Starters", description: "Grilled cottage cheese with aromatic spices", available: true, rating: 4.5 },
    { id: 2, name: "🌯 Veg Spring Roll", price: 180, image: "https://images.pexels.com/photos/1624487/pexels-photo-1624487.jpeg?w=150&h=150&fit=crop", category: "Starters", description: "Crispy rolls with fresh vegetables", available: true, rating: 4.3 },
    { id: 3, name: "🍗 Chicken Biryani", price: 320, image: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=150&h=150&fit=crop", category: "Main Course", description: "Aromatic basmati rice with tender chicken", available: true, rating: 4.8 },
    { id: 4, name: "🥘 Veg Biryani", price: 250, image: "https://images.pexels.com/photos/1639557/pexels-photo-1639557.jpeg?w=150&h=150&fit=crop", category: "Main Course", description: "Fragrant rice with garden vegetables", available: true, rating: 4.6 },
    { id: 5, name: "🥖 Butter Naan", price: 45, image: "https://images.pexels.com/photos/958545/pexels-photo-958545.jpeg?w=150&h=150&fit=crop", category: "Breads", description: "Soft tandoori bread with butter", available: true, rating: 4.4 },
    { id: 6, name: "🧄 Garlic Naan", price: 55, image: "https://images.pexels.com/photos/958545/pexels-photo-958545.jpeg?w=150&h=150&fit=crop", category: "Breads", description: "Flavorful naan with fresh garlic", available: true, rating: 4.5 },
    { id: 7, name: "☕ Masala Chai", price: 25, image: "https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg?w=150&h=150&fit=crop", category: "Beverages", description: "Traditional spiced Indian tea", available: true, rating: 4.7 },
    { id: 8, name: "🥭 Mango Lassi", price: 90, image: "https://images.pexels.com/photos/302899/pexels-photo-302899.jpeg?w=150&h=150&fit=crop", category: "Beverages", description: "Refreshing mango yogurt drink", available: true, rating: 4.9 },
    { id: 9, name: "🍨 Gulab Jamun", price: 80, image: "https://images.pexels.com/photos/2067401/pexels-photo-2067401.jpeg?w=150&h=150&fit=crop", category: "Desserts", description: "Soft milk dumplings in sugar syrup", available: true, rating: 4.8 },
    { id: 10, name: "🍦 Ice Cream", price: 70, image: "https://images.pexels.com/photos/2067401/pexels-photo-2067401.jpeg?w=150&h=150&fit=crop", category: "Desserts", description: "Creamy vanilla ice cream", available: true, rating: 4.6 }
  ];
  
  // ======================== TAX CALCULATION FUNCTION ========================
  function calculateBillWithTax(subtotal) {
    const cgstAmount = (subtotal * TAX_SETTINGS.cgst.rate) / 100;
    const sgstAmount = (subtotal * TAX_SETTINGS.sgst.rate) / 100;
    let serviceChargeAmount = 0;
    
    if (TAX_SETTINGS.serviceCharge.enabled) {
      serviceChargeAmount = (subtotal * TAX_SETTINGS.serviceCharge.rate) / 100;
    }
    
    let totalTax = cgstAmount + sgstAmount + serviceChargeAmount;
    let grandTotal = subtotal + totalTax;
    let roundOffAmount = 0;
    
    if (TAX_SETTINGS.roundOff) {
      const roundedTotal = Math.round(grandTotal);
      roundOffAmount = roundedTotal - grandTotal;
      grandTotal = roundedTotal;
    }
    
    return {
      subtotal: subtotal,
      cgst: { amount: cgstAmount, rate: TAX_SETTINGS.cgst.rate },
      sgst: { amount: sgstAmount, rate: TAX_SETTINGS.sgst.rate },
      serviceCharge: { amount: serviceChargeAmount, rate: TAX_SETTINGS.serviceCharge.rate, enabled: TAX_SETTINGS.serviceCharge.enabled },
      totalTax: totalTax,
      roundOff: roundOffAmount,
      grandTotal: grandTotal
    };
  }
  
  // ======================== CART MANAGEMENT ========================
  function saveCart() {
    localStorage.setItem(`cart_table_${tableNumber}`, JSON.stringify(cart));
  }
  
  function loadCart() {
    const saved = localStorage.getItem(`cart_table_${tableNumber}`);
    cart = saved ? JSON.parse(saved) : [];
  }
  
  function addToCart(item) {
    const existing = cart.find(i => i.id === item.id);
    if (existing) {
      existing.quantity = (existing.quantity || 1) + 1;
    } else {
      cart.push({ ...item, quantity: 1 });
    }
    saveCart();
    showToast(`${item.name} added to cart`, 'success');
    render();
  }
  
  function removeFromCart(index) {
    const removed = cart[index];
    cart.splice(index, 1);
    saveCart();
    showToast(`${removed.name} removed`, 'info');
    render();
  }
  
  function updateQuantity(index, change) {
    const item = cart[index];
    if (item) {
      const newQty = (item.quantity || 1) + change;
      if (newQty <= 0) {
        removeFromCart(index);
      } else {
        item.quantity = newQty;
        saveCart();
        render();
      }
    }
  }
  
  function getCartTotal() {
    return cart.reduce((sum, item) => sum + (item.price * (item.quantity || 1)), 0);
  }
  
  function getCartCount() {
    return cart.reduce((sum, item) => sum + (item.quantity || 1), 0);
  }
  
  // ======================== MENU FUNCTIONS ========================
  function loadMenuData() {
    // Load from localStorage first
    const stored = localStorage.getItem('restaurant_menu');
    if (stored) {
      menuItems = JSON.parse(stored);
      isLoading = false;
      render();
    } else {
      menuItems = [...DEFAULT_MENU];
      localStorage.setItem('restaurant_menu', JSON.stringify(menuItems));
      isLoading = false;
      render();
    }
  }
  
  // ======================== ORDER FUNCTIONS ========================
  function placeOrder() {
    if (cart.length === 0) {
      showToast('Your cart is empty', 'error');
      return false;
    }
    
    const subtotal = getCartTotal();
    const taxCalc = calculateBillWithTax(subtotal);
    
    const newOrder = {
      id: 'ORD' + Date.now() + Math.floor(Math.random() * 1000),
      tableNumber: parseInt(tableNumber),
      items: cart.map(i => ({ 
        id: i.id, 
        name: i.name, 
        price: i.price, 
        quantity: i.quantity || 1 
      })),
      subtotal: subtotal,
      cgst: taxCalc.cgst.amount,
      sgst: taxCalc.sgst.amount,
      serviceCharge: taxCalc.serviceCharge.amount,
      totalTax: taxCalc.totalTax,
      roundOff: taxCalc.roundOff,
      totalPrice: taxCalc.grandTotal,
      status: 'Pending',
      timestamp: new Date().toISOString(),
      estimatedTime: 20
    };
    
    // Save to localStorage
    const orders = JSON.parse(localStorage.getItem('restaurant_orders') || '[]');
    orders.unshift(newOrder);
    localStorage.setItem('restaurant_orders', JSON.stringify(orders));
    
    currentOrderId = newOrder.id;
    currentOrderStatus = 'Pending';
    
    // Clear cart
    cart = [];
    saveCart();
    
    showToast('Order placed successfully! 🎉', 'success');
    return true;
  }
  
  function getCurrentOrder() {
    if (!currentOrderId) return null;
    const orders = JSON.parse(localStorage.getItem('restaurant_orders') || '[]');
    return orders.find(o => o.id === currentOrderId);
  }
  
  function updateOrderStatusManually() {
    // This simulates admin updating order status
    // In production, this would be done via admin panel
    if (currentOrderId && currentOrderStatus === 'Pending') {
      setTimeout(() => {
        const orders = JSON.parse(localStorage.getItem('restaurant_orders') || '[]');
        const orderIndex = orders.findIndex(o => o.id === currentOrderId);
        if (orderIndex !== -1) {
          orders[orderIndex].status = 'Preparing';
          localStorage.setItem('restaurant_orders', JSON.stringify(orders));
          if (currentStep === 3) {
            currentOrderStatus = 'Preparing';
            showToast('👨‍🍳 Your order is now being prepared!', 'info');
            render();
          }
        }
      }, 10000); // After 10 seconds
      
      setTimeout(() => {
        const orders = JSON.parse(localStorage.getItem('restaurant_orders') || '[]');
        const orderIndex = orders.findIndex(o => o.id === currentOrderId);
        if (orderIndex !== -1) {
          orders[orderIndex].status = 'Served';
          localStorage.setItem('restaurant_orders', JSON.stringify(orders));
          if (currentStep === 3) {
            currentOrderStatus = 'Served';
            showToast('🎉 Your order is ready! Enjoy your meal!', 'success');
            render();
          }
        }
      }, 20000); // After 20 seconds
    }
  }
  
  // ======================== UI HELPERS ========================
  function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    const bgColors = { success: '#22c55e', error: '#ef4444', info: '#3b82f6', warning: '#f59e0b' };
    const icons = { success: 'fa-check-circle', error: 'fa-exclamation-circle', info: 'fa-info-circle', warning: 'fa-exclamation-triangle' };
    toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 z-50 px-5 py-3 rounded-full shadow-lg text-white font-medium text-sm flex items-center gap-2`;
    toast.style.background = bgColors[type] || bgColors.success;
    toast.style.zIndex = "9999";
    toast.style.animation = "slideUp 0.3s ease-out";
    toast.innerHTML = `<i class="fas ${icons[type]} mr-1"></i>${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  function getFilteredItems() {
    if (selectedCategory === 'All') return menuItems;
    return menuItems.filter(item => item.category === selectedCategory);
  }
  
  function formatCurrency(amount) {
    return '₹' + amount.toFixed(2);
  }
  
  // ======================== RENDER FUNCTIONS ========================

        <!-- Category Tabs -->

                  <div class="flex justify-between items-center mt-2">

          </div>

        <!-- Floating Cart Bar -->
        ${cartCount > 0 ? `
          <div class="fixed bottom-0 left-0 right-0 z-20 max-w-4xl mx-auto px-4 pb-4">

    `;
  }

    return `

                <button class="qty-inc w-8 h-8 rounded-full bg-gray-100 text-gray-600 hover:bg-orange-100 hover:text-orange-600 transition flex items-center justify-center" data-index="${idx}">

                <button class="remove-item ml-1 w-8 h-8 rounded-full bg-red-50 text-red-500 hover:bg-red-100 transition flex items-center justify-center" data-index="${idx}">
                  <i class="fas fa-trash-alt text-sm"></i>
                </button>

          `).join('')}
        </div>
        
        <!-- Bill Summary with GST Breakup -->
        <div class="bg-white rounded-xl shadow-sm p-5 mb-6">

        </div>
        
        <!-- Place Order Button -->
        <button id="placeOrderBtn" class="w-full bg-gradient-to-r from-orange-600 to-orange-500 text-white py-4 rounded-xl font-bold text-lg hover:shadow-lg transition-all flex items-center justify-center gap-2">
          <i class="fas fa-check-circle"></i> Place Order • ₹${taxCalc.grandTotal}
        </button>
        
        <p class="text-center text-xs text-gray-400 mt-4">
          <i class="fas fa-clock mr-1"></i> Estimated preparation time: 15-20 mins
        </p>
      </div>
    `;
  }
  
  function renderConfirmationStep() {
    const order = getCurrentOrder();
    if (!order) {
      return '<div class="flex items-center justify-center min-h-screen"><div class="text-center"><div class="loading-spinner mx-auto"></div><p class="mt-2">Loading order details...</p></div></div>';
    }
    
    const statusSteps = [
      { key: 'Pending', label: 'Order Received', icon: 'fa-receipt', desc: 'Chef will start soon', color: 'bg-yellow-500' },
      { key: 'Preparing', label: 'Preparing', icon: 'fa-utensils', desc: 'Your meal is being cooked', color: 'bg-blue-500' },
      { key: 'Served', label: 'Ready to Serve', icon: 'fa-check-circle', desc: 'Enjoy your meal!', color: 'bg-green-500' }
    ];
    
    let currentStatusIndex = statusSteps.findIndex(s => s.key === order.status);
    if (currentStatusIndex === -1) currentStatusIndex = 0;
    
    return `
      <div class="min-h-screen bg-gradient-to-b from-orange-50 to-white">
        <div class="max-w-2xl mx-auto px-4 py-8">
          <!-- Celebration Header -->
          <div class="text-center mb-8">
            <div class="inline-block bg-green-100 rounded-full p-4 mb-4 animate-slide-up">
              <i class="fas fa-check-circle text-5xl text-green-600"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">Order Confirmed! 🎉</h1>
            <p class="text-gray-500 mt-1">Order #${order.id.slice(-8)}</p>
            <div class="inline-block mt-2 bg-orange-100 px-4 py-1 rounded-full">
              <i class="fas fa-table mr-1 text-orange-600"></i>
              <span class="text-sm font-medium text-orange-700">Table ${order.tableNumber}</span>
            </div>
          </div>
          
          <!-- Live Status Tracker -->
          <div class="bg-white rounded-2xl shadow-md p-6 mb-6">
            <h3 class="font-semibold text-gray-700 mb-6 text-center">Order Status</h3>
            <div class="relative">
              <div class="status-tracker-line"></div>
              <div class="relative flex justify-between z-10">
                ${statusSteps.map((step, idx) => `
                  <div class="text-center flex-1">
                    <div class="w-12 h-12 mx-auto rounded-full flex items-center justify-center transition-all duration-300 
                      ${idx <= currentStatusIndex ? 'bg-orange-600 text-white status-dot-active' : 'bg-gray-200 text-gray-400'}">
                      <i class="fas ${step.icon} text-xl"></i>
                    </div>
                    <p class="text-xs font-semibold mt-2 ${idx <= currentStatusIndex ? 'text-orange-600' : 'text-gray-400'}">${step.label}</p>
                    <p class="text-xs text-gray-400 mt-1 hidden sm:block">${step.desc}</p>
                  </div>
                `).join('')}
              </div>
            </div>
            <div class="mt-6 text-center text-sm text-gray-500 border-t pt-4">
              <i class="fas fa-clock mr-1"></i> 
              ${order.status === 'Pending' ? 'Your order has been received! Chef will start preparing shortly.' : 
                order.status === 'Preparing' ? 'Your delicious food is being prepared with care!' : 
                'Your order is ready! Please collect from the counter.'}
            </div>
          </div>
          
          <!-- Order Summary -->
          <div class="bg-white rounded-2xl shadow-md p-5 mb-6">
            <h3 class="font-semibold text-gray-700 mb-3 flex items-center gap-2">
              <i class="fas fa-receipt text-orange-600"></i> Order Summary
            </h3>
            <div class="space-y-2 max-h-64 overflow-y-auto">
              ${order.items.map(item => `
                <div class="flex justify-between text-sm py-1">
                  <span><span class="font-medium">${item.name}</span> <span class="text-gray-500">x${item.quantity}</span></span>
                  <span class="font-medium">₹${item.price * item.quantity}</span>
                </div>
              `).join('')}
            </div>
            <div class="border-t pt-3 mt-3 space-y-1">
              <div class="flex justify-between text-sm"><span>Subtotal</span><span>₹${order.subtotal}</span></div>
              <div class="flex justify-between text-sm"><span>CGST</span><span>₹${order.cgst}</span></div>
              <div class="flex justify-between text-sm"><span>SGST</span><span>₹${order.sgst}</span></div>
              ${order.serviceCharge > 0 ? `<div class="flex justify-between text-sm"><span>Service Charge</span><span>₹${order.serviceCharge}</span></div>` : ''}
              ${order.roundOff !== 0 ? `<div class="flex justify-between text-sm"><span>Round Off</span><span>${order.roundOff > 0 ? '+' : ''}₹${order.roundOff}</span></div>` : ''}
              <div class="flex justify-between font-bold text-base mt-2 pt-1 border-t">
                <span>Total Paid</span>
                <span class="text-orange-600">₹${order.totalPrice}</span>
              </div>
            </div>
          </div>
          
          <!-- Action Buttons -->
          <div class="flex gap-3">
            <button id="newOrderBtn" class="flex-1 bg-orange-600 text-white py-3 rounded-xl font-semibold hover:bg-orange-700 transition flex items-center justify-center gap-2">
              <i class="fas fa-plus"></i> New Order
            </button>
            <button id="viewMenuAgainBtn" class="flex-1 border-2 border-orange-600 text-orange-600 py-3 rounded-xl font-semibold hover:bg-orange-50 transition flex items-center justify-center gap-2">
              <i class="fas fa-utensils"></i> View Menu
            </button>
          </div>
          
          <div class="mt-4 text-center text-xs text-gray-400">
            <i class="fas fa-heart text-red-400"></i> Thank you for dining with us!
          </div>
        </div>
      </div>
    `;
  }
  
  // ======================== EVENT HANDLERS ========================
  function attachEvents() {
    if (currentStep === 1) {
      document.querySelectorAll('.category-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          selectedCategory = btn.dataset.category;
          render();
        });
      });
      
      document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const menuItemDiv = btn.closest('.menu-item');
          if (menuItemDiv && menuItemDiv.dataset.item) {
            const item = JSON.parse(menuItemDiv.dataset.item);
            addToCart(item);
          }
        });
      });
      
      document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', (e) => {
          if (!e.target.classList.contains('add-to-cart-btn')) {
            const itemData = JSON.parse(item.dataset.item);
            addToCart(itemData);
          }
        });
      });
      
      const viewCartBtn = document.getElementById('viewCartBtn');
      if (viewCartBtn) viewCartBtn.addEventListener('click', () => { currentStep = 2; render(); });
      
      const checkoutBtn = document.getElementById('checkoutFloatingBtn');
      if (checkoutBtn) checkoutBtn.addEventListener('click', () => { currentStep = 2; render(); });
    }
    
    if (currentStep === 2) {
      const backBtn = document.getElementById('backToMenuFromCart');
      const backEmpty = document.getElementById('backToMenuEmptyBtn');
      if (backBtn) backBtn.addEventListener('click', () => { currentStep = 1; render(); });
      if (backEmpty) backEmpty.addEventListener('click', () => { currentStep = 1; render(); });
      
      document.querySelectorAll('.qty-inc').forEach(btn => {
        btn.addEventListener('click', () => { updateQuantity(parseInt(btn.dataset.index), 1); });
      });
      document.querySelectorAll('.qty-dec').forEach(btn => {
        btn.addEventListener('click', () => { updateQuantity(parseInt(btn.dataset.index), -1); });
      });
      document.querySelectorAll('.remove-item').forEach(btn => {
        btn.addEventListener('click', () => { removeFromCart(parseInt(btn.dataset.index)); });
      });
      
      const placeBtn = document.getElementById('placeOrderBtn');
      if (placeBtn) {
        placeBtn.addEventListener('click', () => {
          if (placeOrder()) {
            currentStep = 3;
            render();
            updateOrderStatusManually(); // Simulate status updates
          }
        });
      }
    }
    
    if (currentStep === 3) {
      const newOrderBtn = document.getElementById('newOrderBtn');
      const viewMenuBtn = document.getElementById('viewMenuAgainBtn');
      if (newOrderBtn) newOrderBtn.addEventListener('click', () => { 
        currentOrderId = null; 
        currentStep = 1; 
        render(); 
      });
      if (viewMenuBtn) viewMenuBtn.addEventListener('click', () => { 
        currentStep = 1; 
        render(); 
      });
    }
  }
  
  function render() {
    const root = document.getElementById('app-root');
    if (!root) return;
    
    let html = '';
    if (currentStep === 1) html = renderMenuStep();
    else if (currentStep === 2) html = renderCartStep();
    else if (currentStep === 3) html = renderConfirmationStep();
    
    root.innerHTML = html;
    attachEvents();
  }
  
  // ======================== INITIALIZATION ========================
  function init() {
    loadCart();
    loadMenuData();
    render();
    console.log('✅ App initialized successfully!');
  }
  
  init();
</script>
</body>
</html>
