<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>RestoPOS - Customer Menu Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', sans-serif; }
    .veg-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .veg-dot.green { background: #22c55e; }
    .veg-dot.red { background: #ef4444; }
    .category-tab { transition: all 0.2s ease; cursor: pointer; }
    .category-tab.active { background: #f97316; color: white; border-color: #f97316; }
    .menu-card { transition: all 0.2s ease; }
    .menu-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -8px rgba(0,0,0,0.15); }
    .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #f97316; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .toast { animation: slideIn 0.3s ease-out; position: fixed; bottom: 20px; right: 20px; z-index: 1000; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(100px); } to { opacity: 1; transform: translateX(0); } }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
  // ======================== FIREBASE CONFIGURATION ========================
  const firebaseConfig = {
    apiKey: "AIzaSyDnTl39uYi-NHhBEMeObezN2Uyqkk8sk6Q",
    authDomain: "qrdines-829b7.firebaseapp.com",
    projectId: "qrdines-829b7",
    storageBucket: "qrdines-829b7.firebasestorage.app",
    messagingSenderId: "1025530812948",
    appId: "1:1025530812948:web:66f8e69e0d5af83461e501",
    measurementId: "G-8Y4DWD208G"
  };

  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { 
    getFirestore, 
    collection, 
    onSnapshot, 
    query, 
    where,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ======================== GLOBAL STATE ========================
  let menuItems = [];
  let restaurantSettings = {
    name: 'Spice Garden',
    address: '123 Food Street, MG Road, Bangalore - 560001',
    phone: '+91 98765 43210'
  };
  let selectedCategory = 'All';
  let searchQuery = '';
  let isLoading = true;
  let toast = null;
  let restaurantId = null;
  let unsubscribeMenu = null;
  let selectedItem = null; // For item detail modal

  // ======================== HELPER FUNCTIONS ========================
  function showNotification(message, type = 'success') {
    toast = { message, type };
    render();
    setTimeout(() => { toast = null; render(); }, 3000);
  }

  function formatCurrency(amount) { 
    return '₹' + amount.toFixed(0); 
  }

  // ======================== GET RESTAURANT ID FROM URL ========================
  function getRestaurantIdFromUrl() {
    const urlParams = new URLSearchParams(window.location.search);
    return urlParams.get('resto') || urlParams.get('id') || localStorage.getItem('viewing_restaurant');
  }

  // ======================== FETCH RESTAURANT SETTINGS ========================
  async function fetchRestaurantSettings(restoId) {
    try {
      const settingsRef = doc(db, "restaurants", restoId);
      const settingsDoc = await getDoc(settingsRef);
      if (settingsDoc.exists()) {
        const data = settingsDoc.data();
        restaurantSettings.name = data.name || restaurantSettings.name;
        restaurantSettings.address = data.address || restaurantSettings.address;
        restaurantSettings.phone = data.phone || restaurantSettings.phone;
      }
      render();
    } catch (error) {
      console.error("Error fetching restaurant settings:", error);
    }
  }

  // ======================== LISTEN TO MENU (Real-time updates) ========================
  function listenToMenu(restoId) {
    if (!restoId) return;
    
    if (unsubscribeMenu) unsubscribeMenu();
    
    const menuQuery = query(collection(db, "menu"), where("restaurantId", "==", restoId));
    unsubscribeMenu = onSnapshot(menuQuery, 
      (snapshot) => {
        menuItems = [];
        snapshot.forEach((doc) => {
          const data = doc.data();
          // Only show available items to customers
          if (data.available === true) {
            menuItems.push({ id: doc.id, ...data });
          }
        });
        // Sort by category or name
        menuItems.sort((a, b) => (a.category || '').localeCompare(b.category || ''));
        isLoading = false;
        render();
        console.log(`✅ Menu loaded: ${menuItems.length} available items`);
      },
      (error) => {
        console.error("Error loading menu:", error);
        isLoading = false;
        showNotification("Error loading menu. Please refresh.", "error");
        render();
      }
    );
  }

  // ======================== GET UNIQUE CATEGORIES ========================
  function getCategories() {
    const categories = ['All', ...new Set(menuItems.map(item => item.category).filter(c => c))];
    return categories;
  }

  // ======================== FILTERED ITEMS ========================
  function getFilteredItems() {
    let filtered = menuItems;
    
    // Filter by category
    if (selectedCategory !== 'All') {
      filtered = filtered.filter(item => item.category === selectedCategory);
    }
    
    // Filter by search query
    if (searchQuery.trim()) {
      const query = searchQuery.toLowerCase();
      filtered = filtered.filter(item => 
        item.name.toLowerCase().includes(query) || 
        (item.category && item.category.toLowerCase().includes(query))
      );
    }
    
    return filtered;
  }

  // ======================== OPEN ITEM DETAIL MODAL ========================
  function openItemDetail(item) {
    selectedItem = item;
    render();
  }

  function closeItemDetail() {
    selectedItem = null;
    render();
  }

  // ======================== RENDER FUNCTIONS ========================
  function renderLoading() {
    return `
      <div class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 flex items-center justify-center">
        <div class="text-center">
          <div class="loading-spinner"></div>
          <p class="text-gray-500 mt-4">Loading menu...</p>
        </div>
      </div>
    `;
  }

  function renderError(message) {
    return `
      <div class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-8 max-w-md text-center shadow-xl">
          <i class="fas fa-exclamation-triangle text-5xl text-orange-500 mb-4"></i>
          <h2 class="text-xl font-bold text-gray-800 mb-2">Unable to Load Menu</h2>
          <p class="text-gray-500 mb-4">${message}</p>
          <button onclick="window.location.reload()" class="bg-orange-600 text-white px-6 py-2 rounded-lg">Retry</button>
        </div>
      </div>
    `;
  }

  function renderCustomerPortal() {
    const categories = getCategories();
    const filteredItems = getFilteredItems();
    
    return `
      <div class="min-h-screen bg-gradient-to-br from-orange-50 to-amber-50">
        <!-- Header Section -->
        <div class="bg-white shadow-md sticky top-0 z-20">
          <div class="max-w-6xl mx-auto px-4 py-4">
            <div class="flex flex-wrap justify-between items-center gap-3">
              <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-orange-500 to-orange-600 rounded-xl flex items-center justify-center">
                  <i class="fas fa-utensils text-white text-xl"></i>
                </div>
                <div>
                  <h1 class="text-xl font-bold text-gray-800">${escapeHtml(restaurantSettings.name)}</h1>
                  <p class="text-xs text-gray-500">${escapeHtml(restaurantSettings.address)}</p>
                </div>
              </div>
              <div class="flex gap-2">
                <div class="bg-gray-100 rounded-lg px-3 py-1 text-sm">
                  <i class="fas fa-phone-alt text-orange-600 mr-1"></i> ${escapeHtml(restaurantSettings.phone)}
                </div>
              </div>
            </div>
          </div>
          
          <!-- Search Bar -->
          <div class="max-w-6xl mx-auto px-4 pb-3">
            <div class="relative">
              <i class="fas fa-search absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
              <input type="text" id="customerSearch" placeholder="Search for dishes..." class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:outline-none focus:border-orange-400 focus:ring-2 focus:ring-orange-200">
            </div>
          </div>
          
          <!-- Category Tabs -->
          <div class="max-w-6xl mx-auto px-4 pb-3 overflow-x-auto">
            <div class="flex gap-2 pb-2">
              ${categories.map(cat => `
                <button onclick="window.setCustomerCategory('${cat.replace(/'/g, "\\'")}')" 
                  class="category-tab px-4 py-2 rounded-full text-sm font-medium transition whitespace-nowrap ${selectedCategory === cat ? 'active bg-orange-600 text-white' : 'bg-white text-gray-700 hover:bg-orange-100'}">
                  ${escapeHtml(cat)}
                </button>
              `).join('')}
            </div>
          </div>
        </div>
        
        <!-- Menu Items Grid -->
        <div class="max-w-6xl mx-auto px-4 py-8">
          ${filteredItems.length === 0 ? `
            <div class="text-center py-16">
              <i class="fas fa-utensils text-6xl text-gray-300 mb-4"></i>
              <p class="text-gray-400 text-lg">No items found</p>
              <p class="text-sm text-gray-400 mt-2">Try changing your search or category</p>
            </div>
          ` : `
            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
              ${filteredItems.map(item => `
                <div onclick="window.openItemDetail(${JSON.stringify(item).replace(/"/g, '&quot;')})" 
                  class="menu-card bg-white rounded-2xl overflow-hidden shadow-md hover:shadow-xl transition-all cursor-pointer">
                  <div class="relative h-48 overflow-hidden bg-gray-100">
                    <img src="${item.image || 'https://placehold.co/400x300/F97316/white?text=Food'}" 
                         alt="${escapeHtml(item.name)}" 
                         class="w-full h-full object-cover hover:scale-105 transition duration-300">
                    <div class="absolute top-3 right-3">
                      <span class="veg-dot ${item.veg ? 'green' : 'red'} w-4 h-4"></span>
                    </div>
                    ${item.popular ? '<div class="absolute top-3 left-3 bg-orange-500 text-white text-xs px-2 py-1 rounded-full"><i class="fas fa-fire"></i> Popular</div>' : ''}
                  </div>
                  <div class="p-4">
                    <div class="flex justify-between items-start mb-2">
                      <h3 class="font-bold text-gray-800 text-lg truncate flex-1">${escapeHtml(item.name)}</h3>
                    </div>
                    ${item.category ? `<p class="text-gray-400 text-xs mb-2">${escapeHtml(item.category)}</p>` : ''}
                    <div class="flex justify-between items-center mt-2">
                      <span class="text-2xl font-bold text-orange-600">${formatCurrency(item.price)}</span>
                      <div class="text-xs text-gray-400 flex items-center gap-1">
                        <i class="far fa-clock"></i> 15-20 min
                      </div>
                    </div>
                  </div>
                </div>
              `).join('')}
            </div>
          `}
        </div>
        
        <!-- Footer -->
        <div class="bg-white border-t mt-8 py-4 text-center text-sm text-gray-500">
          <p>© 2024 ${escapeHtml(restaurantSettings.name)} | All Rights Reserved</p>
          <p class="text-xs mt-1">Prices are inclusive of GST</p>
        </div>
      </div>
      
      ${selectedItem ? renderItemDetailModal() : ''}
      ${toast ? renderToast() : ''}
    `;
  }

  function renderItemDetailModal() {
    if (!selectedItem) return '';
    return `
      <div class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4" onclick="if(event.target===this) window.closeItemDetail()">
        <div class="bg-white rounded-2xl max-w-md w-full max-h-[90vh] overflow-y-auto animate-fade-in">
          <div class="relative">
            <img src="${selectedItem.image || 'https://placehold.co/400x300/F97316/white?text=Food'}" 
                 alt="${escapeHtml(selectedItem.name)}" 
                 class="w-full h-56 object-cover rounded-t-2xl">
            <button onclick="window.closeItemDetail()" 
                    class="absolute top-4 right-4 bg-white/90 hover:bg-white rounded-full w-10 h-10 flex items-center justify-center shadow-lg">
              <i class="fas fa-times text-gray-700"></i>
            </button>
            <div class="absolute top-4 left-4">
              <span class="veg-dot ${selectedItem.veg ? 'green' : 'red'} w-5 h-5"></span>
            </div>
          </div>
          <div class="p-6">
            <div class="flex justify-between items-start mb-3">
              <h2 class="text-2xl font-bold text-gray-800">${escapeHtml(selectedItem.name)}</h2>
              ${selectedItem.popular ? '<span class="bg-orange-100 text-orange-600 text-xs px-2 py-1 rounded-full"><i class="fas fa-fire"></i> Popular</span>' : ''}
            </div>
            
            ${selectedItem.category ? `
              <div class="mb-3">
                <span class="inline-block bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full">
                  <i class="fas fa-tag"></i> ${escapeHtml(selectedItem.category)}
                </span>
              </div>
            ` : ''}
            
            <div class="border-t border-b py-4 my-4">
              <div class="flex justify-between items-center">
                <span class="text-gray-600">Price</span>
                <span class="text-3xl font-bold text-orange-600">${formatCurrency(selectedItem.price)}</span>
              </div>
              <div class="flex justify-between items-center mt-2 text-sm text-gray-500">
                <span><i class="far fa-clock"></i> Preparation Time</span>
                <span>15-20 minutes</span>
              </div>
            </div>
            
            <div class="mb-4">
              <h3 class="font-semibold text-gray-700 mb-2">About this item</h3>
              <p class="text-gray-500 text-sm">
                ${selectedItem.veg ? '100% vegetarian dish prepared with fresh ingredients.' : 'Non-vegetarian dish prepared with premium quality ingredients.'}
                Our chefs ensure the highest quality and hygiene standards.
              </p>
            </div>
            
            <div class="bg-orange-50 rounded-xl p-3 text-center text-sm text-orange-700">
              <i class="fas fa-info-circle"></i> Scan QR code at the restaurant to place your order
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderToast() {
    return `
      <div class="toast ${toast.type === 'error' ? 'bg-red-500' : 'bg-green-500'} text-white px-5 py-3 rounded-xl shadow-lg flex items-center gap-2">
        <i class="fas ${toast.type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i>
        <span>${escapeHtml(toast.message)}</span>
      </div>
    `;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
  }

  // ======================== INITIALIZE AND RENDER ========================
  function init() {
    restaurantId = getRestaurantIdFromUrl();
    
    // If no restaurant ID in URL, try to get from localStorage or show demo mode
    if (!restaurantId) {
      // Check if there's a saved restaurant from admin login
      const savedResto = localStorage.getItem('viewing_restaurant');
      if (savedResto) {
        restaurantId = savedResto;
      } else {
        // Demo mode - show sample message
        isLoading = false;
        render();
        return;
      }
    }
    
    if (restaurantId) {
      fetchRestaurantSettings(restaurantId);
      listenToMenu(restaurantId);
    }
  }

  function render() {
    const root = document.getElementById('root');
    if (!root) return;
    
    if (!restaurantId) {
      root.innerHTML = renderError('No restaurant specified. Please use a valid QR code or link.');
      return;
    }
    
    if (isLoading) {
      root.innerHTML = renderLoading();
      return;
    }
    
    if (menuItems.length === 0 && !isLoading) {
      root.innerHTML = renderError('No menu items available at this restaurant. Please check back later.');
      return;
    }
    
    root.innerHTML = renderCustomerPortal();
    
    // Attach search event listener
    const searchInput = document.getElementById('customerSearch');
    if (searchInput) {
      searchInput.value = searchQuery;
      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        render();
      });
    }
  }

  // ======================== GLOBAL FUNCTIONS FOR HTML CALLBACKS ========================
  window.setCustomerCategory = (category) => {
    selectedCategory = category;
    render();
  };
  
  window.openItemDetail = (item) => {
    selectedItem = item;
    render();
  };
  
  window.closeItemDetail = () => {
    selectedItem = null;
    render();
  };

  // Start the app
  init();
</script>
</body>
</html>
